let current = 0, answers = [], totals = [0,0,0,0,0];

function render() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `질문 ${current+1} / ${questions.length}`;
  const pct = Math.round((current+1)/questions.length*100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('back-btn').style.visibility = current > 0 ? 'visible' : 'hidden';
  document.getElementById('q-text').textContent = q.q;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[current] === i ? ' selected' : '');
    btn.textContent = o.text;
    btn.onclick = () => pick(i);
    opts.appendChild(btn);
  });
  updateNext();
}

function pick(i) {
  answers[current] = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  updateNext();
  setTimeout(() => { if (current < questions.length - 1) goNext(); }, 280);
}

function updateNext() {
  const btn = document.getElementById('next-btn');
  btn.textContent = current === questions.length - 1 ? '결과 보기 →' : '다음 →';
  btn.classList.toggle('active', answers[current] !== undefined);
}

function goNext() {
  if (answers[current] === undefined) return;
  if (current === questions.length - 1) { showResult(); return; }
  current++; render();
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  totals = [0,0,0,0,0];
  answers.forEach((a, qi) => questions[qi].opts[a].scores.forEach((s, i) => totals[i] += s));
  const r = results[totals.indexOf(Math.max(...totals))];
  document.getElementById('quiz-section').style.display = 'none';
  const rs = document.getElementById('result-section');
  rs.style.display = 'block';
  rs.innerHTML = `
    <div class="fade-in">
      <div class="result-top">
        <div class="result-emoji-wrap">${r.emoji}</div>
        <div>
          <div class="result-type-label">${r.typeLabel}</div>
          <div class="result-title">${r.title}</div>
          <div class="result-subtitle">${r.subtitle}</div>
        </div>
      </div>
      <p class="result-desc">${r.desc}</p>
      <div class="scores-section">
        <div class="scores-label">항목별 점수</div>
        ${r.bars.map(b => `
          <div class="score-row">
            <div class="score-name">${b.name}</div>
            <div class="score-track"><div class="score-fill" style="width:0%;background:${b.color}" data-val="${b.val}"></div></div>
            <div class="score-val">${b.val}</div>
          </div>`).join('')}
      </div>
      <div class="advice-section">
        <div class="advice-label">솔직한 조언</div>
        ${r.advice.map(a => `
          <div class="advice-item">
            <span class="advice-dot ${a.type === 'pos' ? 'dot-pos' : 'dot-warn'}">${a.type === 'pos' ? '✓' : '!'}</span>
            <span>${a.text}</span>
          </div>`).join('')}
      </div>
      <div class="result-actions">
        <button class="retry-btn" onclick="retry()">↺ 다시 하기</button>
        <button class="save-btn" onclick="shareResult(this)">🔗 친구에게 공유하기</button>
        <a class="root-btn" href="/">나한테 맞는 미국 간호사 루트 보러가기🌿</a>
      </div>
    </div>`;
  setTimeout(() => {
    document.querySelectorAll('.score-fill').forEach(el => { el.style.width = el.dataset.val + '%'; });
  }, 100);
}

async function shareResult(btn) {
  const r = results[totals.indexOf(Math.max(...totals))];
  const shareData = {
    title: '나의 미국 생존 유형 — The Root',
    text: `나는 ${r.title} (${r.subtitle}) 🌿\n\n너는 어떤 유형이야? 10문항으로 알아봐!`,
    url: 'https://theroot-theta.vercel.app/quiz'
  };
  if (navigator.share) {
    try {
      await navigator.share(shareData);
    } catch(e) {
      if (e.name !== 'AbortError') fallbackCopy(btn, shareData);
    }
  } else {
    fallbackCopy(btn, shareData);
  }
}

function fallbackCopy(btn, shareData) {
  const text = `${shareData.text}\n${shareData.url}`;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ 링크 복사됨!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

function retry() {
  current = 0; answers = []; totals = [0,0,0,0,0];
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  render();
}

render();
</script>
